name: build
default_mode: Direct

filesystem:
  read:
    - "."
    - "~/.cargo"
    - "~/.rustup"
    - "/usr"
  write:
    - "./target"
    - "./dist"
    - "./build"
  deny: []

network: none

environment:
  scrub:
    - "AWS_*"
    - "*_SECRET*"
    - "*_PASSWORD*"
    - "*_TOKEN*"
    - "*_KEY"
    - "SSH_AUTH_SOCK"
    - "GOOGLE_APPLICATION_CREDENTIALS"
    - "DATABASE_URL"
  passthrough:
    - "HOME"
    - "PATH"
    - "USER"
    - "SHELL"
    - "TERM"
    - "LANG"
    - "LC_*"
    - "TMPDIR"
    - "XDG_*"
    - "CARGO_HOME"
    - "RUSTUP_HOME"

resources:
  max_cpu_seconds: 600
  max_memory_mb: 8192
  max_open_files: 4096
  max_processes: 512
  max_output_bytes: 8388608

name: agent-inference-allowlist
extends: build

filesystem:
  read:
    - "."
  write:
    - "."

network:
  mode: filtered
  allowed_domains:
    - api.anthropic.com
    - api.openai.com
    - generativelanguage.googleapis.com
    - api.cohere.com
    - api.mistral.ai
    - openrouter.ai

environment:
  scrub:
    - "ANTHROPIC_API_KEY"
    - "OPENAI_API_KEY"
    - "COHERE_API_KEY"
    - "MISTRAL_API_KEY"
    - "*_SECRET*"
    - "*_TOKEN*"
  passthrough:
    - HOME
    - PATH
    - LANG
    - TMPDIR

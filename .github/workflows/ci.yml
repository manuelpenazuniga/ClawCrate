name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

      - name: Audit benchmark compile (informational)
        run: cargo bench -p clawcrate-audit --no-run
        continue-on-error: true

  integration-and-fixtures:
    name: Integration + Fixtures (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Workspace tests
        run: cargo test --workspace

      - name: CLI integration tests
        run: cargo test -p clawcrate-cli --test install_replica_integration

      - name: CLI golden output tests
        run: cargo test -p clawcrate-cli --test golden_cli_outputs

      - name: Sandbox security fixtures
        run: cargo test -p clawcrate-sandbox --test security_fixtures

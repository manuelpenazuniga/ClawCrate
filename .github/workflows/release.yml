name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0-alpha.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --locked --release -p clawcrate-cli --target ${{ matrix.target }}
          else
            cargo build --locked --release -p clawcrate-cli --target ${{ matrix.target }}
          fi

      - name: Package release archive
        run: |
          bash scripts/release.sh package \
            --target "${{ matrix.target }}" \
            --binary "target/${{ matrix.target }}/release/clawcrate" \
            --dist-dir dist

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawcrate-${{ matrix.target }}
          path: dist/clawcrate-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve tag
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: clawcrate-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: bash scripts/release.sh checksums --dist-dir dist

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/clawcrate-*.tar.gz
            dist/SHA256SUMS
            scripts/install.sh

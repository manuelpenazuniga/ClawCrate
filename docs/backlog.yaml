milestones:
  - key: "M0"
    title: "M0 - Workspace Bootstrap"
    description: "Scaffold workspace and baseline CI."
  - key: "M1"
    title: "M1 - Core Contracts + Plan"
    description: "Core types, profile engine, and plan command."
  - key: "M2"
    title: "M2 - Sandbox Backends"
    description: "Linux and macOS sandbox backend implementation."
  - key: "M3"
    title: "M3 - Run + Capture + Audit"
    description: "End-to-end run, capture, and artifact pipeline."
  - key: "M4"
    title: "M4 - Replica Mode"
    description: "Replica workspace flow and sync-back."
  - key: "M5"
    title: "M5 - Alpha Hardening + Release"
    description: "Polish, CI hardening, docs, and alpha release."
  - key: "P1"
    title: "P1 - Network + Approvals"
    description: "Domain-aware networking and approval workflow."
  - key: "P2"
    title: "P2 - Audit DB + API + Integrations"
    description: "Audit DB, local API, and integrations."
  - key: "P3"
    title: "P3 - WSL2"
    description: "Windows support via WSL2."
  - key: "V0.2"
    title: "v0.2.0"
    description: "Compliance Kit, MCP Server Firewall, and Tier 1 polish before the 2026-08-02 EU AI Act window."
  - key: "V0.3"
    title: "v0.3.0"
    description: "Foundations: Linux read-isolation parity + hardening (Epic 6) and scalability/maintainability debt paydown (Epic 7). Re-scoped 2026-07-05 from distribution/marketplace to security correctness."
  - key: "V0.4"
    title: "v0.4.0"
    description: "Adoption & Ecosystem: clawcrate learn (Epic 1), profiles.dev marketplace (Epic 3), and distribution (Epic 5). Distribution/marketplace moved here from v0.3.0 on 2026-07-05."
  - key: "V1.0"
    title: "v1.0"
    description: "Structural hardening + surface freeze: network enforcement, replay, certifications, plugin system (Epic 9)."

epics:
  - id: "M0-EPIC"
    milestone: "M0 - Workspace Bootstrap"
    title: "[EPIC] M0 - Workspace Bootstrap"
    labels: ["type:epic", "phase:alpha", "priority:p0", "area:repo"]
    objective: "Turn the repository into a buildable Rust workspace with enforceable quality gates."
    done_when:
      - "Workspace compiles on Linux/macOS."
      - "CI runs fmt, clippy, test, and check."
      - "Built-in profile files are present in version control."

  - id: "M1-EPIC"
    milestone: "M1 - Core Contracts + Plan"
    title: "[EPIC] M1 - Core Contracts + Plan"
    labels: ["type:epic", "phase:alpha", "priority:p0", "platform:cross-platform"]
    objective: "Implement shared contracts, profile resolution, and the dry-run planning UX."
    done_when:
      - "Core types are stable and serializable."
      - "Profile resolver works for built-in profiles."
      - "`clawcrate plan` produces human and JSON output."

  - id: "M2-EPIC"
    milestone: "M2 - Sandbox Backends"
    title: "[EPIC] M2 - Sandbox Backends"
    labels: ["type:epic", "phase:alpha", "priority:p0", "platform:cross-platform", "crate:sandbox"]
    objective: "Implement native Linux and macOS sandbox backends with capability diagnostics."
    done_when:
      - "Linux backend enforces Landlock + seccomp policy."
      - "macOS backend enforces Seatbelt profile."
      - "`clawcrate doctor` reports capabilities clearly."

  - id: "M3-EPIC"
    milestone: "M3 - Run + Capture + Audit"
    title: "[EPIC] M3 - Run + Capture + Audit"
    labels: ["type:epic", "phase:alpha", "priority:p0", "platform:cross-platform"]
    objective: "Deliver end-to-end command execution with logs, fs-diff, and artifacts."
    done_when:
      - "`clawcrate run` executes with sandbox applied."
      - "stdout/stderr and fs-diff are captured."
      - "All artifact files are emitted per execution."

  - id: "M4-EPIC"
    milestone: "M4 - Replica Mode"
    title: "[EPIC] M4 - Replica Mode"
    labels: ["type:epic", "phase:alpha", "priority:p0", "crate:cli", "platform:cross-platform"]
    objective: "Ship secure replica workflows, including exclusions and explicit sync-back."
    done_when:
      - "Install profile defaults to replica."
      - "`.env*` and secret files are excluded from copy."
      - "Sync-back requires explicit confirmation."

  - id: "M5-EPIC"
    milestone: "M5 - Alpha Hardening + Release"
    title: "[EPIC] M5 - Alpha Hardening + Release"
    labels: ["type:epic", "phase:alpha", "priority:p1", "platform:cross-platform"]
    objective: "Polish alpha UX, harden CI, and publish reproducible release artifacts."
    done_when:
      - "CLI polish and golden tests are in place."
      - "Linux/macOS CI is green."
      - "Alpha release artifacts and docs are published."

  - id: "P1-EPIC"
    milestone: "P1 - Network + Approvals"
    title: "[EPIC] P1 - Network + Approvals"
    labels: ["type:epic", "phase:post-alpha", "priority:p1", "platform:cross-platform"]
    objective: "Introduce domain-aware network control and approval workflows."
    done_when:
      - "Egress proxy MVP exists with policy controls."
      - "Sensitive commands can require explicit approval."
      - "Community profile contribution path is documented."

  - id: "P2-EPIC"
    milestone: "P2 - Audit DB + API + Integrations"
    title: "[EPIC] P2 - Audit DB + API + Integrations"
    labels: ["type:epic", "phase:post-alpha", "priority:p2", "platform:cross-platform"]
    objective: "Provide queryable audit storage and programmable interfaces."
    done_when:
      - "SQLite audit index is functional."
      - "Local API exposes core operations."
      - "Integration bridge is available for external tooling."

  - id: "P3-EPIC"
    milestone: "P3 - WSL2"
    title: "[EPIC] P3 - WSL2"
    labels: ["type:epic", "phase:post-alpha", "priority:p2", "platform:linux"]
    objective: "Define and implement minimum viable support for WSL2 users."
    done_when:
      - "Compatibility constraints are documented."
      - "CI validates baseline WSL2 support."
      - "Known limitations are explicit in docs."

  - id: "GH-219"
    github_issue: 219
    state: "open"
    milestone: "v0.2.0"
    title: "Epic 4: MCP Server Firewall - sandbox every MCP invocation"
    labels: ["type:epic", "priority:p0", "tier:T1", "area:mcp", "area:profiles"]
    objective: "Make ClawCrate the first practical sandbox layer for MCP servers by wrapping any stdio MCP server transparently."
    source: "docs/roadmap-2026-05-09.md"
    done_when:
      - "`clawcrate mcp wrap` can launch a stdio MCP server through ClawCrate."
      - "JSON-RPC stdio framing remains transparent to clients such as Claude Desktop, Cursor, and Continue.dev."
      - "MCP server attempts to read local secrets are blocked and audited."
      - "Integration recipes and a demo are available."

  - id: "GH-220"
    github_issue: 220
    state: "open"
    milestone: "v0.4.0"
    title: "Epic 5: Distribution - GitHub Action + agent integrations + VS Code extension"
    labels: ["type:epic", "priority:p1", "tier:T2", "area:integration", "area:examples"]
    objective: "Move ClawCrate from individual local usage to team adoption through CI, reference integrations, and editor entry points."
    source: "docs/roadmap-2026-05-09.md"
    done_when:
      - "`clawcrate/action@v1` exists and can upload audit artifacts."
      - "Reference integration examples exist for major agent tools."
      - "A VS Code extension MVP can run commands under ClawCrate and surface audit state."

  - id: "GH-221"
    github_issue: 221
    state: "open"
    milestone: "v0.4.0"
    title: "Epic 3: profiles.dev - community-signed profile marketplace"
    labels: ["type:epic", "priority:p1", "tier:T2", "area:profiles"]
    objective: "Turn the local community profile catalog into a discoverable, cacheable, and eventually signed profile ecosystem."
    source: "docs/roadmap-2026-05-09.md"
    done_when:
      - "`clawcrate profiles fetch/search/install` can work against the MVP catalog."
      - "Downloaded profiles are verified by SHA256 before use."
      - "The external profile repository is bootstrapped with contribution guidance and seed profiles."
      - "Sigstore signing is defined for the v0.4.0 phase."

  - id: "GH-222"
    github_issue: 222
    state: "open"
    milestone: "v0.4.0"
    title: "Epic 1: clawcrate learn - auto-generate tightest-fit profiles by tracing"
    labels: ["type:epic", "priority:p1", "tier:T3", "platform:cross-platform", "crate:sandbox", "area:profiles"]
    objective: "Remove YAML authoring friction by tracing command behavior and synthesizing the smallest useful ClawCrate profile."
    source: "docs/roadmap-2026-05-09.md"
    done_when:
      - "`clawcrate learn` traces filesystem, network, environment, and process behavior."
      - "Trace output can be reduced into a profile YAML."
      - "Learned profiles can be used locally and published into the profile ecosystem."

  - id: "GH-218"
    github_issue: 218
    state: "closed"
    milestone: "v0.2.0"
    title: "Epic 2: Compliance Kit - hash chain + verify + signing + SIEM"
    labels: ["type:epic", "priority:p0", "tier:T1", "area:compliance", "crate:audit"]
    objective: "Ship an audit-grade, tamper-evident audit trail (hash chain, canonical JSON, verify, Ed25519 signing, SIEM export) aligned with EU AI Act Article 12 and IETF draft-sharif."
    source: "docs/roadmap-2026-05-09.md"
    done_when:
      - "SHA-256 hash-chain audit lines are available opt-in."
      - "`clawcrate verify` checks integrity offline."
      - "Ed25519 block signing and SIEM export formats are available."
      - "EU AI Act and IETF alignment docs are published."

  - id: "GH-268"
    github_issue: 268
    state: "open"
    milestone: "v0.3.0"
    title: "Epic 6: Security Parity & Hardening - close the Linux read-isolation gap"
    labels: ["type:epic", "priority:p0", "tier:T2", "platform:cross-platform", "crate:sandbox", "area:compliance"]
    objective: "Make the read-isolation promise true on 100% of platforms/modes (Linux Landlock read-allowlisting) and pay down adjacent hardening debt (seccomp posture, artifact permissions, API bind, honest warnings)."
    source: "docs/roadmap-2026-07-05.md; docs/strategic-audit-2026-07-05.md"
    done_when:
      - "Linux Direct Mode enforces read isolation with a CI landmark fixture."
      - "seccomp posture is deny-by-default allowlist or documented + expanded denylist."
      - "Artifacts are created 0700/0600; non-loopback API bind is gated."
      - "plan/doctor honestly surface the Linux read gap until read-allowlisting lands."

  - id: "GH-269"
    github_issue: 269
    state: "open"
    milestone: "v0.3.0"
    title: "Epic 7: Scalability & Maintainability - decompose CLI, CoW replica, cheap fs-diff"
    labels: ["type:epic", "priority:p1", "tier:T2", "platform:cross-platform", "crate:cli"]
    objective: "Pay down the structural debt (5.8k-line CLI monolith, full-copy replica, full-hash fs-diff) that blocks contributor onboarding and the next large features."
    source: "docs/roadmap-2026-07-05.md; docs/strategic-audit-2026-07-05.md"
    done_when:
      - "main.rs is decomposed into feature modules with no behavior change."
      - "Replica uses CoW/reflink + hardlink fast paths with correct fallback."
      - "fs-diff has a metadata-first mode with opt-in audit-grade full hashing."

  - id: "GH-270"
    github_issue: 270
    state: "open"
    milestone: "v0.2.0"
    title: "Epic 8: Adoption Wave - capitalize MCP Firewall + Compliance Kit"
    labels: ["type:epic", "priority:p0", "tier:T1", "area:mcp", "area:integration", "area:docs"]
    objective: "Convert already-shipped MCP Firewall + Compliance Kit into adoption inside the EU AI Act window: one-command MCP install, a demoable exfil->blocked story, and a consolidated differentials narrative. Near-zero new runtime code."
    source: "docs/roadmap-2026-07-05.md; docs/strategic-audit-2026-07-05.md"
    done_when:
      - "`clawcrate mcp install` safely rewrites client mcp.json (dry-run + backup + idempotent)."
      - "The filesystem MCP demo shows blocked secret read + verify-passing audit chain."
      - "README leads with the Policy + Evidence positioning and five differentials."
      - "An adopter-facing EU AI Act Article 12 statement is published."

  - id: "GH-271"
    github_issue: 271
    state: "open"
    milestone: "v1.0"
    title: "Epic 9: v1.0 Structural Hardening & Surface Freeze"
    labels: ["type:epic", "priority:p1", "tier:T3", "platform:cross-platform"]
    objective: "Close residual threat-model gaps (network enforcement), deliver reproducibility (replay), certifications, and freeze the CLI surface for a production v1.0."
    source: "docs/roadmap-2026-07-05.md; docs/strategic-audit-2026-07-05.md"
    done_when:
      - "network: filtered has a documented, tested, enforced path (not best-effort)."
      - "`clawcrate replay` reproduces a recorded run."
      - "A Windows go/no-go decision is recorded and the CLI surface is frozen."

